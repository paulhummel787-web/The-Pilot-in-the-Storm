<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect OS | The Clarity Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020202; --accent: #fbbf24; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.01); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.06); }
        .bg-blob { position: fixed; width: 900px; height: 900px; filter: blur(160px); opacity: 0.08; z-index: -1; transition: 2s; border-radius: 50%; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen custom-scroll">

    <div id="blob1" class="bg-blob top-[-20%] left-[-15%] bg-indigo-900"></div>
    <div id="blob2" class="bg-blob bottom-[-20%] right-[-15%] bg-amber-900"></div>

    <div class="max-w-7xl mx-auto space-y-10">
        <nav class="glass rounded-[3rem] p-6 flex flex-col xl:flex-row justify-between items-center gap-6 sticky top-6 z-50">
            <div class="flex items-center gap-6">
                <div id="state-indicator" class="w-6 h-6 rounded-full bg-yellow-400 shadow-[0_0_20px_#fbbf24] transition-all duration-1000"></div>
                <h1 class="font-black tracking-tighter text-2xl uppercase italic leading-none">Architect <span class="opacity-20 not-italic text-sm">OS</span></h1>
            </div>
            
            <div class="flex gap-10 text-[10px] font-black uppercase tracking-[0.4em] opacity-40 mono">
                <button onclick="switchTab('library')" class="hover:text-amber-400 transition">01_Library</button>
                <button onclick="switchTab('toolkit')" class="hover:text-amber-400 transition">02_Toolkit</button>
                <button onclick="switchTab('resources')" class="hover:text-amber-400 transition">03_Resources</button>
                <button onclick="switchTab('terminal')" class="hover:text-amber-400 transition">04_Terminal</button>
            </div>
        </nav>

        <main id="app-viewport" class="min-h-[70vh]"></main>
    </div>

    <script>
        const ARCHITECT_DB = {
            state: 'yellow',
            tab: 'library',
            
            // WEAVING: Grounding Tool (from CSV/PDF)
            toolkit: [
                { phase: "DESCENT", step: "1. Horizon", action: "What is my current 'mental weather'?", purpose: "Map the landscape." },
                { phase: "DESCENT", step: "2. Filter", action: "Is this noise (fear) or signal (need)?", purpose: "Isolate the true need." },
                { phase: "DESCENT", step: "3. Pinpoint", action: "What is the one tiny, kind act I can do?", purpose: "Find the Fox." },
                { phase: "ASCENT", step: "4. Why", action: "Is this reaction from the present or a past trigger?", purpose: "Identify root cause." },
                { phase: "LOOP", step: "8. So What?", action: "What am I giving myself permission to stop doing?", purpose: "Strategic relief." }
            ],

            // WEAVING: Resources (from CSV)
            resources: [
                { cat: "Crisis", title: "988 Lifeline", desc: "Immediate emotional support.", link: "988" },
                { cat: "ADHD", title: "NIMH Directory", desc: "Official clinical resources and mapping.", link: "https://nimh.nih.gov" },
                { cat: "BPD", title: "DBT Skills", desc: "Top-down regulation tools.", link: "#" }
            ],

            // Books and Content
            library: {
                vol1: { title: "Architect OS", chapters: [{ id: 1, title: "Symptom Soup", content: "..." }] },
                vol2: { title: "Journey to Zion", chapters: [{ id: 15, title: "The Snap", content: "..." }] }
            }
        };

        function switchTab(t) { ARCHITECT_DB.tab = t; render(); }

        function render() {
            const vp = document.getElementById('app-viewport');
            
            if(ARCHITECT_DB.tab === 'toolkit') {
                vp.innerHTML = `
                    <div class="grid grid-cols-1 gap-4 slide-up">
                        <div class="glass p-10 rounded-[3rem] mb-6">
                            <h2 class="text-3xl font-black italic uppercase mb-2">Grounding Engine</h2>
                            <p class="opacity-40 text-sm mono tracking-widest uppercase">The Descent and Ascent Protocol</p>
                        </div>
                        ${ARCHITECT_DB.toolkit.map(item => `
                            <div class="glass p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-6 group hover:bg-white/5 transition">
                                <div class="flex items-center gap-6">
                                    <span class="text-[10px] mono font-bold opacity-20">${item.phase}</span>
                                    <div>
                                        <h4 class="text-lg font-bold group-hover:text-amber-400 transition">${item.step}</h4>
                                        <p class="text-sm opacity-60 italic">"${item.action}"</p>
                                    </div>
                                </div>
                                <div class="text-[10px] uppercase tracking-widest opacity-30">${item.purpose}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(ARCHITECT_DB.tab === 'resources') {
                vp.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 slide-up">
                        ${ARCHITECT_DB.resources.map(res => `
                            <div class="glass p-8 rounded-[2.5rem] hover:border-white/20 transition group">
                                <span class="text-[9px] font-black uppercase tracking-[0.3em] opacity-30">${res.cat}</span>
                                <h3 class="text-xl font-black italic uppercase mt-2 mb-4 group-hover:text-indigo-400">${res.title}</h3>
                                <p class="text-sm opacity-40 mb-6 leading-relaxed">${res.desc}</p>
                                <a href="${res.link}" class="text-[10px] font-black uppercase tracking-widest opacity-20 hover:opacity-100 transition underline underline-offset-8">Access Portal →</a>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(ARCHITECT_DB.tab === 'library') {
                vp.innerHTML = `<div class="p-20 text-center opacity-20 tracking-widest uppercase">Library Volumes Loaded. Select Toolkit or Resources for Data Deployment.</div>`;
            }

            if(ARCHITECT_DB.tab === 'terminal') {
                vp.innerHTML = `
                    <div class="glass rounded-[3.5rem] p-12 min-h-[500px] flex flex-col mono text-xs">
                        <div class="flex-1 overflow-y-auto space-y-2 opacity-60" id="t-out">
                            <div class="text-amber-500">[SYNC] Grounding CSV Injected Successfully.</div>
                            <div class="text-indigo-400">[SYNC] Resource Structure Mapped.</div>
                            <div>System Ready for High-Use Interaction.</div>
                        </div>
                        <input type="text" class="bg-transparent border-none outline-none w-full uppercase mt-8 pt-8 border-t border-white/5 tracking-[0.4em]" placeholder="PILOT_CMD >">
                    </div>
                `;
            }
        }

        render();
    </script>
</body>
</html>
