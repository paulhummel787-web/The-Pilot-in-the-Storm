<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect OS | The Pilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --purple: #818cf8; --gold: #fbbf24; --red: #f87171;
            --blue: #60a5fa; --green: #34d399; --orange: #fb923c;
            --bg: #050505;
        }
        body { background: var(--bg); color: white; font-family: system-ui, sans-serif; overflow-x: hidden; transition: 0.5s; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07); }
        .bg-blob { position: fixed; width: 600px; height: 600px; filter: blur(120px); opacity: 0.12; z-index: -1; transition: 1.5s ease-in-out; border-radius: 50%; }
        .terminal-text { font-family: 'Courier New', monospace; color: #00ff88; text-shadow: 0 0 5px #00ff88; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .state-active { box-shadow: 0 0 20px currentColor; transform: scale(1.1); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="blob1" class="bg-blob top-[-20%] left-[-10%] bg-amber-500"></div>
    <div id="blob2" class="bg-blob bottom-[-20%] right-[-10%] bg-indigo-700"></div>

    <div class="max-w-6xl mx-auto space-y-6">
        <nav class="glass rounded-3xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-4 z-50">
            <div class="flex items-center gap-4">
                <div id="state-indicator" class="w-4 h-4 rounded-full bg-yellow-400 shadow-[0_0_15px_#fbbf24] transition-all duration-700"></div>
                <h1 class="font-bold tracking-tighter text-2xl uppercase italic">Architect <span class="opacity-30 not-italic text-lg">OS</span></h1>
            </div>
            
            <div class="flex gap-2 p-1 bg-white/5 rounded-full border border-white/10">
                <button onclick="setSystemColor('yellow')" class="w-6 h-6 rounded-full bg-amber-400 hover:scale-110 transition"></button>
                <button onclick="setSystemColor('red')" class="w-6 h-6 rounded-full bg-red-500 hover:scale-110 transition"></button>
                <button onclick="setSystemColor('orange')" class="w-6 h-6 rounded-full bg-orange-500 hover:scale-110 transition"></button>
                <button onclick="setSystemColor('purple')" class="w-6 h-6 rounded-full bg-purple-500 hover:scale-110 transition"></button>
                <button onclick="setSystemColor('blue')" class="w-6 h-6 rounded-full bg-blue-500 hover:scale-110 transition"></button>
                <button onclick="setSystemColor('green')" class="w-6 h-6 rounded-full bg-emerald-500 hover:scale-110 transition"></button>
            </div>

            <div class="flex gap-8 text-xs font-bold uppercase tracking-[0.3em] opacity-60">
                <button onclick="switchTab('library')" class="hover:text-amber-400 transition">Library</button>
                <button onclick="switchTab('archives')" class="hover:text-amber-400 transition">Archives</button>
                <button onclick="switchTab('terminal')" class="hover:text-amber-400 transition">Terminal</button>
            </div>
        </nav>

        <main id="app-viewport" class="min-h-[75vh] transition-all duration-500"></main>
    </div>

    <script>
        // GLOBAL REGISTRY (WEAVING DATA)
        const ARCHITECT_DB = {
            state: 'yellow',
            tab: 'library',
            
            // From PDF 1: The Pilot and the Storm
            library: [
                { id: 1, title: "The Landscape of the Storm", content: "The storm is not outside of you. It is the reallocation of your nervous system's resources." },
                { id: 2, title: "The Anatomy of Shutdown", content: "Brain fog is 'Evacuation Mode'. The Prefrontal Cortex goes offline to save energy for survival." },
                { id: 3, title: "The Architect vs. The Pilot", content: "The Pilot flies the plane. The Architect builds the cockpit. You cannot fly if the cockpit is melting." }
            ],

            // From PDF 2: BEE WELL ARCHITECT P and R (The 5 Struggles)
            archives: [
                { id: "s1", title: "Safety Mode Brain Fog", tags: ["ADHD", "CPTSD"], content: "When stress spikes, the 'thinking brain' (Logic) shuts down. You lose words, forget tasks, and feel 'blank' during medical calls." },
                { id: "s2", title: "Analysis Paralysis", tags: ["Decision Fatigue"], content: "Choosing a service feels life-altering. You do nothing because the 'correct' first step is invisible." },
                { id: "s3", title: "Working Memory Blackouts", tags: ["Memory"], content: "Great realizations vanish the moment you open an email or pick up the phone." },
                { id: "s4", title: "Emotional Hyper-Arousal", tags: ["BPD", "Regulation"], content: "A busy signal triggers a total meltdown. The 'No Brakes' feeling takes over." },
                { id: "s5", title: "The Wall of Awful", tags: ["Depression", "ADHD"], content: "Starting a task feels physically heavy. Activation energy is at an all-time high." }
            ],

            corrections: {
                yellow: { label: "ADHD / DOPAMINE", action: "Fix the State: Reduce inputs. One Fox only." },
                red: { label: "BPD / PANIC", action: "Fix the State: Cold water / Physical shock." },
                orange: { label: "CPTSD / SHADOW", action: "Fix the State: 5-4-3-2-1 Grounding." },
                purple: { label: "GAD / PRESSURE", action: "Fix the State: Externalize to Paper." },
                blue: { label: "MDD / GRAVITY", action: "Fix the State: Micro-movement only." },
                green: { label: "OPTIMAL / SIGNAL", action: "State Clear: Execute Great Fox." }
            }
        };

        function switchTab(t) { ARCHITECT_DB.tab = t; render(); }

        function setSystemColor(c) {
            ARCHITECT_DB.state = c;
            const colors = { yellow: '#fbbf24', red: '#f87171', orange: '#fb923c', purple: '#a855f7', blue: '#3b82f6', green: '#10b981' };
            document.getElementById('state-indicator').style.backgroundColor = colors[c];
            document.getElementById('blob1').style.backgroundColor = colors[c];
            render();
        }

        function render() {
            const vp = document.getElementById('app-viewport');
            const stateInfo = ARCHITECT_DB.corrections[ARCHITECT_DB.state];

            if(ARCHITECT_DB.tab === 'library') {
                vp.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <div class="glass p-6 rounded-3xl h-fit border-l-4 border-amber-500/50">
                            <h2 class="text-xs uppercase tracking-[0.3em] mb-2 opacity-40">Active State</h2>
                            <div class="text-xl font-bold mb-1">${stateInfo.label}</div>
                            <div class="text-sm opacity-80">${stateInfo.action}</div>
                        </div>
                        <div class="md:col-span-2 space-y-4">
                            ${ARCHITECT_DB.library.map(book => `
                                <div class="glass p-8 rounded-3xl hover:bg-white/5 transition group cursor-pointer" onclick="openDoc('${book.title}', '${book.content}')">
                                    <div class="flex justify-between items-center">
                                        <h3 class="text-xl font-bold group-hover:text-amber-400 transition">${book.title}</h3>
                                        <span class="opacity-20 text-xs tracking-widest">READ →</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            if(ARCHITECT_DB.tab === 'archives') {
                vp.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 animate-in fade-in duration-700">
                        ${ARCHITECT_DB.archives.map(doc => `
                            <div class="glass p-6 rounded-2xl hover:border-white/20 transition group" onclick="openDoc('${doc.title}', '${doc.content}')">
                                <div class="flex gap-2 mb-3">
                                    ${doc.tags.map(t => `<span class="text-[10px] px-2 py-0.5 rounded-full bg-white/10 opacity-50">${t}</span>`).join('')}
                                </div>
                                <h3 class="font-bold mb-2 group-hover:text-amber-400">${doc.title}</h3>
                                <p class="text-sm opacity-40 line-clamp-2">${doc.content}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(ARCHITECT_DB.tab === 'terminal') {
                vp.innerHTML = `
                    <div class="glass rounded-3xl p-8 min-h-[500px] terminal-text flex flex-col animate-in zoom-in-95 duration-500">
                        <div class="flex-1 overflow-y-auto custom-scroll mb-4 opacity-80" id="t-out">
                            [SYSTEM READY]<br>Type /help to view commands...
                        </div>
                        <div class="flex gap-3 items-center border-t border-white/10 pt-4">
                            <span class="animate-pulse">▶</span>
                            <input type="text" class="bg-transparent border-none outline-none w-full uppercase tracking-widest text-sm" 
                                   placeholder="ENTER COMMAND..." onkeydown="if(event.key==='Enter'){ document.getElementById('t-out').innerHTML += '<div>> ' + this.value + '</div>'; this.value=''; }">
                        </div>
                    </div>
                `;
            }
        }

        function openDoc(title, content) {
            const vp = document.getElementById('app-viewport');
            vp.innerHTML = `
                <div class="glass p-8 md:p-12 rounded-[3rem] animate-in fade-in scale-in-95 duration-500 max-w-4xl mx-auto">
                    <button onclick="render()" class="mb-8 opacity-30 hover:opacity-100 transition text-xs tracking-[0.4em]">← ESCAPE TO SYSTEM</button>
                    <h1 class="text-4xl font-black italic tracking-tighter mb-8 text-amber-400 uppercase">${title}</h1>
                    <div class="text-xl leading-relaxed opacity-80 space-y-6 font-light">
                        ${content}
                    </div>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // INIT
        setSystemColor('yellow');
    </script>
</body>
</html>
