<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect OS | Zion Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --purple: #818cf8; --gold: #fbbf24; --red: #f87171;
            --blue: #60a5fa; --green: #34d399; --orange: #fb923c;
            --bg: #030303;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; transition: 0.5s; }
        .glass { background: rgba(255,255,255,0.01); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.06); }
        .bg-blob { position: fixed; width: 700px; height: 700px; filter: blur(140px); opacity: 0.1; z-index: -1; transition: 2s ease-in-out; border-radius: 50%; }
        .terminal-text { font-family: 'Courier New', monospace; color: #00ff88; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
        .zion-gold { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">

    <div id="blob1" class="bg-blob top-[-25%] left-[-15%] bg-indigo-900"></div>
    <div id="blob2" class="bg-blob bottom-[-25%] right-[-15%] bg-amber-900"></div>

    <div class="max-w-7xl mx-auto space-y-8">
        <nav class="glass rounded-[2rem] p-6 flex flex-col lg:flex-row justify-between items-center gap-6 sticky top-6 z-50">
            <div class="flex items-center gap-5">
                <div id="state-indicator" class="w-5 h-5 rounded-full bg-yellow-400 shadow-[0_0_20px_#fbbf24] transition-all duration-1000"></div>
                <div>
                    <h1 class="font-black tracking-tighter text-2xl uppercase italic leading-none">Architect <span class="opacity-20 not-italic text-sm">OS</span></h1>
                    <p class="text-[10px] uppercase tracking-[0.4em] opacity-40 mt-1">Navigation & Zion Registry</p>
                </div>
            </div>
            
            <div class="flex gap-3 p-1.5 bg-white/5 rounded-full border border-white/10">
                <button onclick="setSystemColor('yellow')" class="w-8 h-8 rounded-full bg-amber-400 hover:scale-110 transition shadow-lg"></button>
                <button onclick="setSystemColor('red')" class="w-8 h-8 rounded-full bg-red-500 hover:scale-110 transition shadow-lg"></button>
                <button onclick="setSystemColor('orange')" class="w-8 h-8 rounded-full bg-orange-500 hover:scale-110 transition shadow-lg"></button>
                <button onclick="setSystemColor('purple')" class="w-8 h-8 rounded-full bg-purple-500 hover:scale-110 transition shadow-lg"></button>
                <button onclick="setSystemColor('blue')" class="w-8 h-8 rounded-full bg-blue-500 hover:scale-110 transition shadow-lg"></button>
                <button onclick="setSystemColor('green')" class="w-8 h-8 rounded-full bg-emerald-500 hover:scale-110 transition shadow-lg"></button>
            </div>

            <div class="flex gap-10 text-[11px] font-black uppercase tracking-[0.4em] opacity-50">
                <button onclick="switchTab('library')" class="hover:text-amber-400 hover:opacity-100 transition">Library</button>
                <button onclick="switchTab('archives')" class="hover:text-amber-400 hover:opacity-100 transition">Archives</button>
                <button onclick="switchTab('terminal')" class="hover:text-amber-400 hover:opacity-100 transition">Terminal</button>
            </div>
        </nav>

        <main id="app-viewport" class="min-h-[70vh]"></main>
    </div>

    <script>
        const ARCHITECT_DB = {
            state: 'yellow',
            tab: 'library',
            
            // WEAVING BOOK 1: Architect / Rachel Document
            bookArchitect: {
                title: "Architect OS: The Operating System",
                chapters: [
                    { id: 1, title: "The Symptom Soup", content: "The complex mind does not experience challenges in isolation; it lives within a 'Symptom Soup' where neurological and emotional currents overlap. Restlessness may be the precursor to anxiety, or emotional flooding leads to a dissociative freeze." },
                    { id: 2, title: "The Anatomy of Shutdown", content: "Shutdown is not a failure of will; it is a biological 'Evacuation' protocol. The Pilot (Prefrontal Cortex) goes offline to preserve resources. Recognizing this is the first step in de-escalating the alarm." },
                    { id: 33, title: "The Architect's Creed", content: "I do not fight my nature—I design for it. I am the Pilot of a complex craft, and while I cannot control the weather, I possess the tools to navigate it. One pebble, one breath, one step." }
                ]
            },

            // WEAVING BOOK 2: Journey to Zion / Paul Hummel
            bookZion: {
                title: "Bleeding Through the Page: Journey to Zion",
                chapters: [
                    { id: 1, title: "The Black Room", content: "I was a 'paralyzed being' trapped in a black room, carrying 100 pounds of dead weight and watching my life bleed through the page of a corrupted tomorrow." },
                    { id: 15, title: "November 29: The Snap", content: "The Snap is the moment of divine intervention. The laughing pills went silent and the Sanity Ring began to chime. It is the repositioning of motion—trading a heart of stone for a heart of flesh." },
                    { id: 19, title: "The War Room of Zion", content: "Zion is the radiant height of spiritual authority. We move from the miry clay to the War Room, retaking the land and establishing the Mind of Christ." }
                ]
            },

            archives: [
                { id: "A1", title: "Atmospheric Calibration", tags: ["Medication", "Logic"], content: "Medication is not a 'fix' but a calibration of the internal atmosphere to allow the Pilot to remain in the cockpit longer." },
                { id: "A2", title: "External Scaffolding", tags: ["Support", "Design"], content: "The Support Grid (therapists, doctors, friends) acts as an External Pilot when your own system has evacuated." }
            ],

            corrections: {
                yellow: "Fix the State: ADHD / Dopamine Gap. One Fox focus.",
                red: "Fix the State: BPD / Emotional Flood. Cold water shock.",
                orange: "Fix the State: CPTSD / Shadow. 5-4-3-2-1 Grounding.",
                purple: "Fix the State: GAD / High Pressure. Brain dump to paper.",
                blue: "Fix the State: MDD / Gravity. Micro-physical movement.",
                green: "State Clear: Optimal Signal. Execute the Great Fox."
            }
        };

        function switchTab(t) { ARCHITECT_DB.tab = t; render(); }

        function setSystemColor(c) {
            ARCHITECT_DB.state = c;
            const colors = { yellow: '#fbbf24', red: '#f87171', orange: '#fb923c', purple: '#a855f7', blue: '#3b82f6', green: '#10b981' };
            document.getElementById('state-indicator').style.backgroundColor = colors[c];
            document.getElementById('blob1').style.backgroundColor = colors[c];
            render();
        }

        function render() {
            const vp = document.getElementById('app-viewport');
            
            if(ARCHITECT_DB.tab === 'library') {
                vp.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in duration-700">
                        <div class="glass p-10 rounded-[3rem] border-t-4 border-indigo-500/30">
                            <h2 class="text-xs uppercase tracking-[0.5em] opacity-30 mb-4">Volume I: Navigation</h2>
                            <h3 class="text-3xl font-black mb-6 uppercase italic">${ARCHITECT_DB.bookArchitect.title}</h3>
                            <div class="space-y-3">
                                ${ARCHITECT_DB.bookArchitect.chapters.map(ch => `
                                    <button onclick="openDoc('${ch.title}', '${ch.content}')" class="w-full text-left p-4 rounded-2xl hover:bg-white/5 border border-white/5 transition flex justify-between items-center group">
                                        <span class="text-sm font-bold opacity-60 group-hover:opacity-100 group-hover:text-indigo-400">CH ${ch.id}: ${ch.title}</span>
                                        <span class="text-[10px] opacity-20">→</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <div class="glass p-10 rounded-[3rem] border-t-4 border-amber-500/30">
                            <h2 class="text-xs uppercase tracking-[0.5em] opacity-30 mb-4">Volume II: Spirit</h2>
                            <h3 class="text-3xl font-black zion-gold mb-6 uppercase italic">${ARCHITECT_DB.bookZion.title}</h3>
                            <div class="space-y-3">
                                ${ARCHITECT_DB.bookZion.chapters.map(ch => `
                                    <button onclick="openDoc('${ch.title}', '${ch.content}')" class="w-full text-left p-4 rounded-2xl hover:bg-white/5 border border-white/5 transition flex justify-between items-center group">
                                        <span class="text-sm font-bold opacity-60 group-hover:opacity-100 group-hover:text-amber-400">CH ${ch.id}: ${ch.title}</span>
                                        <span class="text-[10px] opacity-20">→</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="mt-8 glass p-6 rounded-2xl text-center">
                        <p class="text-xs tracking-[0.6em] opacity-30 uppercase">System Status: ${ARCHITECT_DB.corrections[ARCHITECT_DB.state]}</p>
                    </div>
                `;
            }

            if(ARCHITECT_DB.tab === 'archives') {
                vp.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-in zoom-in-95 duration-700">
                        ${ARCHITECT_DB.archives.map(doc => `
                            <div class="glass p-8 rounded-3xl hover:border-white/20 transition group cursor-pointer" onclick="openDoc('${doc.title}', '${doc.content}')">
                                <div class="flex gap-2 mb-4">
                                    ${doc.tags.map(t => `<span class="text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-full bg-white/5 border border-white/10 opacity-40">${t}</span>`).join('')}
                                </div>
                                <h3 class="text-xl font-black uppercase italic mb-3 group-hover:text-amber-400">${doc.title}</h3>
                                <p class="text-sm opacity-40 line-clamp-3 leading-relaxed">${doc.content}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(ARCHITECT_DB.tab === 'terminal') {
                vp.innerHTML = `
                    <div class="glass rounded-[3rem] p-10 min-h-[550px] terminal-text flex flex-col shadow-2xl">
                        <div class="flex-1 overflow-y-auto custom-scroll mb-6 opacity-80 space-y-2 text-sm" id="t-out">
                            <div class="opacity-30 tracking-[0.2em]">[SYSTEM INITIALIZED]</div>
                            <div class="opacity-30 tracking-[0.2em]">[LOGGING FROM ZION & ARCHITECT]</div>
                            <div class="mt-4">Welcome, Pilot. Type /help to begin command sequence.</div>
                        </div>
                        <div class="flex gap-4 items-center border-t border-white/10 pt-6">
                            <span class="text-amber-500 font-bold tracking-widest animate-pulse">CMD_</span>
                            <input type="text" class="bg-transparent border-none outline-none w-full uppercase tracking-[0.2em] text-sm" 
                                   placeholder="awaiting input..." onkeydown="if(event.key==='Enter'){ document.getElementById('t-out').innerHTML += '<div>> ' + this.value + '</div>'; this.value=''; }">
                        </div>
                    </div>
                `;
            }
        }

        function openDoc(title, content) {
            const vp = document.getElementById('app-viewport');
            vp.innerHTML = `
                <div class="glass p-10 md:p-20 rounded-[4rem] animate-in fade-in slide-in-from-bottom-10 duration-1000 max-w-5xl mx-auto shadow-2xl border border-white/10">
                    <button onclick="render()" class="mb-12 opacity-20 hover:opacity-100 transition text-[10px] font-black tracking-[0.5em] uppercase border border-white/20 px-6 py-2 rounded-full">← Return to System</button>
                    <h1 class="text-5xl font-black italic tracking-tighter mb-10 text-white uppercase leading-tight">${title}</h1>
                    <div class="text-2xl leading-[1.6] opacity-70 space-y-8 font-light tracking-wide">
                        ${content}
                    </div>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        render();
    </script>
</body>
</html>
