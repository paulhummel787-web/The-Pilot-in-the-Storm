<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect OS | The Pilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --purple: #818cf8; --gold: #fbbf24; --red: #f87171;
            --blue: #60a5fa; --green: #34d399; --orange: #fb923c;
            --bg: #0a0a0a;
        }
        body { background: var(--bg); color: white; font-family: system-ui, sans-serif; overflow-x: hidden; transition: 0.5s; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .bg-blob { position: fixed; width: 500px; height: 500px; filter: blur(100px); opacity: 0.15; z-index: -1; transition: 1s; }
        .terminal-text { font-family: 'Courier New', monospace; color: #00ff88; text-shadow: 0 0 5px #00ff88; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="blob1" class="bg-blob top-[-10%] left-[-10%] bg-indigo-600"></div>
    <div id="blob2" class="bg-blob bottom-[-10%] right-[-10%] bg-purple-600"></div>

    <div class="max-w-6xl mx-auto space-y-6">
        <nav class="glass rounded-2xl p-4 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <div id="state-indicator" class="w-3 h-3 rounded-full bg-yellow-400 shadow-[0_0_10px_#fbbf24]"></div>
                <h1 class="font-bold tracking-tighter text-xl">ARCHITECT <span class="opacity-40 text-sm">OS</span></h1>
            </div>
            <div class="flex gap-6 text-sm font-medium uppercase tracking-widest opacity-60" id="main-nav">
                <button onclick="switchTab('library')" class="hover:opacity-100 transition">Library</button>
                <button onclick="switchTab('archives')" class="hover:opacity-100 transition">Archives</button>
                <button onclick="switchTab('terminal')" class="hover:opacity-100 transition">Terminal</button>
            </div>
        </nav>

        <main id="app-viewport" class="min-h-[70vh] animate-in fade-in duration-700">
            </main>
    </div>

    <script>
        // GLOBAL STATE
        const OS = {
            state: 'yellow', // yellow, red, blue, purple, green, orange
            tab: 'library',
            library: { book1: [], book2: [] },
            archives: [], // For the 25 written docs
            snippets: []  // For the 10 code docs
        };

        // CORE ENGINES
        function switchTab(tabName) {
            OS.tab = tabName;
            render();
        }

        function setSystemColor(colorName) {
            const colors = {
                yellow: '#fbbf24', red: '#f87171', blue: '#60a5fa', 
                purple: '#818cf8', green: '#34d399', orange: '#fb923c'
            };
            document.getElementById('state-indicator').style.backgroundColor = colors[colorName];
            document.getElementById('state-indicator').style.boxShadow = `0 0 15px ${colors[colorName]}`;
            document.getElementById('blob1').style.backgroundColor = colors[colorName];
            OS.state = colorName;
        }

        function render() {
            const viewport = document.getElementById('app-viewport');
            
            if(OS.tab === 'library') {
                viewport.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="glass p-8 rounded-3xl">
                            <h2 class="text-2xl font-bold mb-4">Book I</h2>
                            <p class="opacity-50 mb-6">The Pilot and the Storm</p>
                            <button class="w-full py-3 border border-white/10 rounded-xl hover:bg-white/5 transition">Open Volume</button>
                        </div>
                        <div class="glass p-8 rounded-3xl">
                            <h2 class="text-2xl font-bold mb-4">Book II</h2>
                            <p class="opacity-50 mb-6">Second Volume (Pending Data)</p>
                            <button class="w-full py-3 border border-white/10 rounded-xl hover:bg-white/5 transition">Open Volume</button>
                        </div>
                    </div>
                `;
            }

            if(OS.tab === 'terminal') {
                viewport.innerHTML = `
                    <div class="glass rounded-3xl p-6 min-h-[400px] terminal-text flex flex-col">
                        <div class="flex-1 overflow-y-auto custom-scroll mb-4" id="terminal-out">
                            Welcome to Architect OS... Type /help for commands.
                        </div>
                        <input type="text" id="term-input" class="bg-transparent border-none outline-none w-full" 
                               placeholder="> _" onkeydown="handleCommand(event)">
                    </div>
                `;
            }
        }

        function handleCommand(e) {
            if(e.key === 'Enter') {
                const input = e.target.value;
                const out = document.getElementById('terminal-out');
                out.innerHTML += `<div>> ${input}</div>`;
                // Logic for processing commands will go here
                e.target.value = '';
            }
        }

        // Initialize
        render();
    </script>
</body>
</html>
