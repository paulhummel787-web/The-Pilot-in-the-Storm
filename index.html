<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect OS | Master Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            /* State Colors */
            --yellow: #facc15;  /* Static / ADHD */
            --red: #ef4444;     /* Heat / BPD */
            --orange: #fb923c;  /* Threat / CPTSD */
            --purple: #8b5cf6;  /* Pressure / Anxiety */
            --blue: #3b82f6;    /* Gravity / Depression */
            --green: #10b981;   /* Flow / Regulated */
            
            --bg-base: #0a0a0a;
            --panel-glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-base);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        .glass {
            background: var(--panel-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
        }

        .state-btn {
            transition: transform 0.2s, filter 0.2s;
            filter: grayscale(0.4) opacity(0.7);
        }

        .state-btn.active {
            filter: grayscale(0) opacity(1);
            transform: scale(1.05);
            border-color: currentColor;
        }

        /* Ambient Background Blobs */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            transition: background 1s ease;
        }

        #timer-display {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -2px;
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="blob top-[-10%] left-[-10%] bg-indigo-600" id="blob-1"></div>
    <div class="blob bottom-[-10%] right-[-10%] bg-blue-900" id="blob-2"></div>

    <main class="max-w-4xl mx-auto space-y-6">
        
        <header class="flex justify-between items-end border-b border-white/10 pb-4">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">ARCHITECT <span class="text-indigo-400">OS</span></h1>
                <p class="text-xs text-white/40 uppercase tracking-widest" id="system-path">Pilot // The-Pilot // v21.0</p>
            </div>
            <div class="text-right">
                <div class="text-3xl font-bold" id="clock">00:00</div>
                <div class="text-[10px] text-green-400 font-mono" id="sync-status">● SYSTEM_NOMINAL</div>
            </div>
        </header>

        <section class="grid grid-cols-5 gap-3">
            <button onclick="setState('yellow')" class="state-btn glass p-4 text-center border-b-4 border-transparent" style="color: var(--yellow);">
                <i class="fa-solid fa-bolt mb-2"></i><span class="block text-[10px] font-bold">STATIC</span>
            </button>
            <button onclick="setState('red')" class="state-btn glass p-4 text-center border-b-4 border-transparent" style="color: var(--red);">
                <i class="fa-solid fa-fire-flame-curved mb-2"></i><span class="block text-[10px] font-bold">HEAT</span>
            </button>
            <button onclick="setState('orange')" class="state-btn glass p-4 text-center border-b-4 border-transparent" style="color: var(--orange);">
                <i class="fa-solid fa-shield-halved mb-2"></i><span class="block text-[10px] font-bold">THREAT</span>
            </button>
            <button onclick="setState('purple')" class="state-btn glass p-4 text-center border-b-4 border-transparent" style="color: var(--purple);">
                <i class="fa-solid fa-brain mb-2"></i><span class="block text-[10px] font-bold">PRESSURE</span>
            </button>
            <button onclick="setState('blue')" class="state-btn glass p-4 text-center border-b-4 border-transparent" style="color: var(--blue);">
                <i class="fa-solid fa-anchor mb-2"></i><span class="block text-[10px] font-bold">GRAVITY</span>
            </button>
        </section>

        <div class="grid md:grid-cols-2 gap-6">
            
            <div class="glass p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold uppercase tracking-wider text-white/60">Current Protocol</h2>
                    <span id="state-badge" class="px-2 py-0.5 rounded text-[10px] font-bold bg-white/10">SELECT STATE</span>
                </div>
                <div id="protocol-content" class="min-h-[120px] text-lg font-medium leading-relaxed">
                    Awaiting state selection...
                </div>
                <button onclick="triggerMVS()" class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-bold border border-white/10 transition-all">
                    EXECUTE MVS (Minimum Viable Step)
                </button>
            </div>

            <div class="glass p-6 flex flex-col items-center justify-center relative">
                <canvas id="waveChart" width="200" height="200"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span class="text-4xl font-black" id="wave-value">70</span>
                    <span class="text-[10px] text-white/40 font-mono">GOVERNOR</span>
                </div>
                <input type="range" min="0" max="100" value="70" class="w-full mt-4 accent-indigo-500" oninput="updateWave(this.value)">
            </div>

        </div>

        <section class="grid md:grid-cols-3 gap-6">
            <div class="md:col-span-2 glass p-6">
                <h2 class="text-sm font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-bullseye text-indigo-400"></i> THE FOX (Main Objective)
                </h2>
                <div class="flex gap-2">
                    <input type="text" id="fox-input" placeholder="Set today's primary lever..." class="flex-1 bg-white/5 border border-white/10 rounded-lg p-3 text-sm focus:outline-none focus:border-indigo-500">
                    <button onclick="saveFox()" class="px-4 bg-indigo-600 rounded-lg text-sm font-bold hover:bg-indigo-500 transition-colors">SET</button>
                </div>
                <div id="fox-display" class="mt-4 text-xl font-bold italic text-white/80"></div>
            </div>

            <div class="glass p-6 flex flex-col items-center justify-center">
                <div class="text-[10px] font-bold text-white/40 mb-2 uppercase">Flow Timer</div>
                <div id="timer-display" class="text-4xl font-bold mb-4">25:00</div>
                <button id="timer-btn" onclick="toggleTimer()" class="px-6 py-2 bg-white text-black rounded-full font-bold text-xs">START</button>
            </div>
        </section>

    </main>

    <script>
        /* =========================
           OS DATA & LOGIC
           ========================= */
        const PROTOCOLS = {
            yellow: { badge: "STATIC", text: "System Noise detected. Reduce inputs. Put on brown noise. Simplify the next task to one sentence.", color: "#facc15" },
            red: { badge: "HEAT", text: "Emotional Spike. 90-second flush active. Splash cold water on face. Do not speak. Do not send messages.", color: "#ef4444" },
            orange: { badge: "THREAT", text: "Survival mode active. 5-4-3-2-1 Grounding: Name 5 things you see. You are physically safe.", color: "#fb923c" },
            purple: { badge: "PRESSURE", text: "Logic Loop detected. Externalize thoughts. Open a notepad and dump every worry. Stop trying to solve inside your head.", color: "#8b5cf6" },
            blue: { badge: "GRAVITY", text: "System Shutdown. Battery low. Hydrate. Lie on the floor for 5 minutes. No expectations of performance.", color: "#3b82f6" }
        };

        let appState = {
            current: null,
            wave: 70,
            timer: null,
            timerActive: false,
            timeLeft: 1500
        };

        /* =========================
           CORE FUNCTIONS
           ========================= */
        function setState(stateKey) {
            appState.current = stateKey;
            const data = PROTOCOLS[stateKey];
            
            // UI Updates
            document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.getElementById('protocol-content').innerText = data.text;
            document.getElementById('state-badge').innerText = data.badge;
            document.getElementById('state-badge').style.color = data.color;
            
            // Ambient shift
            document.getElementById('blob-1').style.background = data.color;
        }

        function updateWave(val) {
            appState.wave = val;
            document.getElementById('wave-value').innerText = val;
            waveChart.data.datasets[0].data = [val, 100 - val];
            
            // Color shift based on governor
            if (val > 80) waveChart.data.datasets[0].backgroundColor[0] = '#ef4444';
            else waveChart.data.datasets[0].backgroundColor[0] = '#6366f1';
            
            waveChart.update();
        }

        function saveFox() {
            const val = document.getElementById('fox-input').value;
            document.getElementById('fox-display').innerText = `"${val}"`;
            document.getElementById('fox-input').value = "";
        }

        function triggerMVS() {
            alert("Minimum Viable Step: Do the 2-minute version of your objective. Just open the document or stand up. Lower the bar until you can clear it.");
        }

        /* =========================
           TIMER SYSTEM
           ========================= */
        function toggleTimer() {
            if (appState.timerActive) {
                clearInterval(appState.timer);
                document.getElementById('timer-btn').innerText = "START";
            } else {
                appState.timer = setInterval(updateTimer, 1000);
                document.getElementById('timer-btn').innerText = "PAUSE";
            }
            appState.timerActive = !appState.timerActive;
        }

        function updateTimer() {
            if (appState.timeLeft <= 0) {
                clearInterval(appState.timer);
                alert("Session Complete. Resetting state.");
                return;
            }
            appState.timeLeft--;
            const m = Math.floor(appState.timeLeft / 60);
            const s = appState.timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        /* =========================
           CHART INITIALIZATION
           ========================= */
        const ctx = document.getElementById('waveChart').getContext('2d');
        const waveChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [70, 30],
                    backgroundColor: ['#6366f1', 'rgba(255,255,255,0.05)'],
                    borderWidth: 0,
                    circumference: 180,
                    rotation: 270,
                    cutout: '85%'
                }]
            },
            options: {
                responsive: false,
                plugins: { legend: { display: false } }
            }
        });

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);
    </script>
</body>
</html>
